<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SIL V&amp;V Testbench — ROS2</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="conn-status">
    <span class="dot"></span>
    <span class="txt">ROS2 disconnected</span>
  </div>

  <div id="app">
    <aside id="sidebar">
      <h1 class="logo">SIL V&amp;V Testbench</h1>
      <div id="sidebar-body"></div>
      <div class="toolbar">
        <button id="btn-run" class="primary" data-requires-ros disabled>Run TC</button>
        <button id="btn-reset" type="button">Reset</button>
        <button id="btn-stop-stack" type="button" title="Desconecta el cliente WebSocket">Stop stack</button>
      </div>
    </aside>

    <main id="main">
      <div id="main-inner">
        <div id="main-display"></div>
        <div id="tc-description-host" aria-label="Descripción del TC"></div>
        <div id="results-host" aria-label="Resultados"></div>
      </div>
    </main>

    <aside id="right-panel"></aside>

    <section id="log" aria-label="log"></section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
  <script src="js/ros_bridge.js"></script>
  <script src="js/tc_runner.js"></script>
  <script src="js/displays/telemetry.js"></script>
  <script src="js/displays/map2d.js"></script>
  <script src="js/displays/altitude.js"></script>
  <script src="js/displays/fsm_graph.js"></script>
  <script src="js/displays/daidalus.js"></script>
  <script src="js/displays/fdir_tree.js"></script>
  <script src="js/displays/fault_tree.js"></script>
  <script src="js/panels/base_panel.js"></script>
  <script src="js/panels/fsm_graph_panel.js"></script>
  <script src="js/panels/map_panel.js"></script>
  <script src="js/panels/radar_panel.js"></script>
  <script src="js/panels/latency_panel.js"></script>
  <script src="js/panels/watchdog_panel.js"></script>
  <script src="js/panels/e2e_panel.js"></script>
  <script src="js/panels/memory_panel.js"></script>
  <script src="js/modules/m1_fsm.js"></script>
  <script src="js/modules/m2_integrity.js"></script>
  <script src="js/modules/m4_loc.js"></script>
  <script src="js/modules/m5_dai.js"></script>
  <script src="js/modules/m6_fdir.js"></script>
  <script src="js/modules/m7_nav.js"></script>
  <script src="js/modules/m8_mw.js"></script>
  <script src="js/modules/m9_e2e.js"></script>
  <script src="js/modules/m10_faults.js"></script>
  <script src="js/tc_definitions.js"></script>
  <script src="js/panels/tc_description_panel.js"></script>
  <script src="js/panels/results_panel.js"></script>
  <script src="js/llm_analyst.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
