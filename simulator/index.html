<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UAS Mission Simulator (Standalone)</title>
  <style>
    body {
      margin: 0;
      background: #0d1b2a;
      color: #e6edf3;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      display: flex;
      justify-content: center;
      padding: 18px;
    }
    .wrap { width: 980px; }
    h1 {
      margin: 0 0 12px 0;
      font-size: 18px;
      color: #9fd3ff;
      letter-spacing: 0.4px;
    }
    canvas {
      display: block;
      width: 900px;
      height: 500px;
      border: 1px solid #28465f;
      border-radius: 10px;
      box-shadow: 0 0 0 1px #1b3347 inset;
      background: #0d1b2a;
    }
    .controls, .chips, .telemetry {
      width: 900px;
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      background: #16334a;
      color: #e6edf3;
      border: 1px solid #2e5672;
      border-radius: 8px;
      padding: 8px 10px;
      font: inherit;
      cursor: pointer;
    }
    button:hover { background: #1d425f; }
    .chip {
      border: 1px solid #315672;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      color: #9ab6cc;
      background: #122a3b;
    }
    .chip.active {
      color: #ffffff;
      font-weight: 700;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.10) inset;
    }
    .card {
      flex: 1 1 200px;
      min-width: 200px;
      border: 1px solid #2d4f68;
      border-radius: 8px;
      padding: 8px;
      background: #122a3b;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-size: 12px;
    }
    .bar {
      height: 8px;
      border-radius: 99px;
      background: #203b50;
      border: 1px solid #345972;
      overflow: hidden;
    }
    .fill {
      height: 100%;
      width: 0%;
      transition: width 0.15s linear;
    }
    .hint {
      width: 900px;
      margin-top: 8px;
      font-size: 12px;
      color: #8ca8bd;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>UAS Autonomous Mission Simulator — GPP + DAA + FSM</h1>
    <canvas id="sim" width="900" height="500"></canvas>

    <div class="controls">
      <button id="startBtn">Start mission</button>
      <button id="intruderBtn">Inject intruder</button>
      <button id="sensorBtn">Sensor fault</button>
      <button id="batteryBtn">Battery critical</button>
      <button id="resetBtn">Reset</button>
    </div>

    <div class="chips" id="chips"></div>

    <div class="telemetry">
      <div class="card">
        <div class="row"><span>quality_flag</span><span id="qualityTxt">1.00</span></div>
        <div class="bar"><div id="qualityBar" class="fill"></div></div>
      </div>
      <div class="card">
        <div class="row"><span>daidalus_alert</span><span id="alertTxt">NONE</span></div>
        <div class="bar"><div id="alertBar" class="fill"></div></div>
      </div>
      <div class="card">
        <div class="row"><span>battery</span><span id="batteryTxt">100%</span></div>
        <div class="bar"><div id="batteryBar" class="fill"></div></div>
      </div>
      <div class="card">
        <div class="row"><span>fsm_state</span><span id="fsmTxt">PREFLIGHT</span></div>
        <div class="bar"><div id="fsmBar" class="fill"></div></div>
      </div>
    </div>
    <div class="hint">SIL puro visual. Sin servidor: abre este archivo directamente en navegador.</div>
  </div>

  <script>
    (function () {
      const canvas = document.getElementById("sim");
      const ctx = canvas.getContext("2d");

      const W = canvas.width;
      const H = canvas.height;
      const HOME = { x: 60, y: 440 };
      const TARGET = { x: 840, y: 60 };

      const NFZ = [
        { name: "NFZ-A", x: 260, y: 170, w: 140, h: 120 },
        { name: "NFZ-B", x: 500, y: 90, w: 120, h: 120 },
        { name: "NFZ-C", x: 620, y: 250, w: 120, h: 110 }
      ];

      const BASE_PATH = [
        { x: 60, y: 440 },
        { x: 180, y: 370 },
        { x: 260, y: 320 },
        { x: 420, y: 320 },
        { x: 500, y: 250 },
        { x: 640, y: 240 },
        { x: 760, y: 150 },
        { x: 840, y: 60 }
      ];

      const STATE_COLORS = {
        PREFLIGHT: "#5b7f9b",
        TAKEOFF: "#00bcd4",
        CRUISE: "#35c759",
        EVENT: "#ffcc00",
        LANDING: "#00bcd4",
        RTB: "#ff9500",
        ABORT: "#ff3b30"
      };

      const STATES = ["PREFLIGHT", "TAKEOFF", "CRUISE", "EVENT", "LANDING", "RTB", "ABORT"];

      const chipsEl = document.getElementById("chips");
      STATES.forEach((s) => {
        const c = document.createElement("div");
        c.className = "chip";
        c.id = "chip-" + s;
        c.textContent = s;
        chipsEl.appendChild(c);
      });

      const ui = {
        qualityTxt: document.getElementById("qualityTxt"),
        alertTxt: document.getElementById("alertTxt"),
        batteryTxt: document.getElementById("batteryTxt"),
        fsmTxt: document.getElementById("fsmTxt"),
        qualityBar: document.getElementById("qualityBar"),
        alertBar: document.getElementById("alertBar"),
        batteryBar: document.getElementById("batteryBar"),
        fsmBar: document.getElementById("fsmBar")
      };

      let sim;
      let raf = 0;

      function buildPath(mode, start, target) {
        if (mode === "DETOUR") {
          return [
            { x: start.x, y: start.y },
            { x: Math.min(start.x + 40, 860), y: Math.min(start.y + 90, 470) },
            { x: 520, y: 390 },
            { x: 700, y: 300 },
            { x: 790, y: 180 },
            { x: target.x, y: target.y }
          ];
        }
        if (mode === "RTB") {
          return [
            { x: start.x, y: start.y },
            { x: Math.max(start.x - 100, 120), y: Math.min(start.y + 80, 470) },
            { x: 170, y: 420 },
            { x: HOME.x, y: HOME.y }
          ];
        }
        return BASE_PATH.map((p) => ({ x: p.x, y: p.y }));
      }

      function resetSim() {
        sim = {
          running: false,
          fsmState: "PREFLIGHT",
          eventSubstate: "",
          qualityFlag: 1.0,
          daidalusAlert: "NONE",
          daidalusLevel: 0,
          battery: 100,
          batteryCriticalInjected: false,
          sensorFaultActive: false,
          sensorFaultRecoverAt: 0,
          routeMode: "BASE",
          waypoints: buildPath("BASE", HOME, TARGET),
          wpIndex: 1,
          uas: { x: HOME.x, y: HOME.y, heading: -0.4, speed: 0 },
          trail: [],
          intruder: { active: false, x: 930, y: 230, vx: -2.1, vy: -0.15, pulse: 0 },
          replanning: false,
          replanningFrames: 0,
          replanFrom: null,
          missionDoneAt: 0
        };
      }

      function dist(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      function lerpAngle(a, b, t) {
        const d = ((b - a + Math.PI * 3) % (Math.PI * 2)) - Math.PI;
        return a + d * t;
      }

      function startMission() {
        cancelAnimationFrame(raf);
        resetSim();
        sim.running = true;
        sim.fsmState = "TAKEOFF";
        sim.uas.speed = 2.2;
        raf = requestAnimationFrame(loop);
      }

      function injectIntruder() {
        if (!sim.running || (sim.fsmState !== "CRUISE" && sim.fsmState !== "TAKEOFF")) return;
        sim.intruder.active = true;
        sim.intruder.x = 930;
        sim.intruder.y = 245;
        sim.intruder.vx = -2.0;
        sim.intruder.vy = -0.18;
      }

      function sensorFault() {
        if (!sim.running) return;
        sim.sensorFaultActive = true;
        sim.sensorFaultRecoverAt = performance.now() + 5000;
      }

      function batteryCritical() {
        if (!sim.running) return;
        sim.batteryCriticalInjected = true;
        sim.battery = Math.min(sim.battery, 10);
      }

      function setRoute(mode) {
        sim.routeMode = mode;
        sim.waypoints = buildPath(mode, { x: sim.uas.x, y: sim.uas.y }, mode === "RTB" ? HOME : TARGET);
        sim.wpIndex = 1;
      }

      function update(dtMs) {
        if (!sim.running) return;
        const dt = dtMs / 16.67;

        sim.battery -= (sim.batteryCriticalInjected ? 0.08 : 0.015) * dt;
        sim.battery = Math.max(0, sim.battery);

        if (sim.sensorFaultActive) {
          sim.qualityFlag = Math.max(0.2, sim.qualityFlag - 0.008 * dt);
          if (performance.now() > sim.sensorFaultRecoverAt) {
            sim.sensorFaultActive = false;
          }
        } else {
          sim.qualityFlag = Math.min(1.0, sim.qualityFlag + 0.006 * dt);
        }

        if (sim.intruder.active) {
          sim.intruder.x += sim.intruder.vx * dt;
          sim.intruder.y += sim.intruder.vy * dt;
          sim.intruder.pulse += 0.07 * dt;
          if (sim.intruder.x < -40 || sim.intruder.y < -40 || sim.intruder.y > H + 40) {
            sim.intruder.active = false;
            sim.daidalusLevel = 0;
            sim.daidalusAlert = "NONE";
            if (sim.fsmState === "EVENT" && sim.eventSubstate === "TRAFFIC_CONFLICT") {
              sim.fsmState = "CRUISE";
              sim.eventSubstate = "";
            }
          } else {
            const d = Math.hypot(sim.uas.x - sim.intruder.x, sim.uas.y - sim.intruder.y);
            sim.daidalusLevel = d < 75 ? 3 : d < 120 ? 2 : d < 180 ? 1 : 0;
            sim.daidalusAlert = ["NONE", "FAR", "MID", "NEAR"][sim.daidalusLevel];
          }
        } else {
          sim.daidalusLevel = 0;
          sim.daidalusAlert = "NONE";
        }

        if (sim.battery <= 10 && sim.fsmState !== "RTB" && sim.fsmState !== "LANDING") {
          sim.fsmState = "RTB";
          sim.eventSubstate = "";
          setRoute("RTB");
        }

        if (sim.qualityFlag < 0.5 && sim.fsmState !== "RTB" && sim.fsmState !== "LANDING") {
          sim.fsmState = "EVENT";
          sim.eventSubstate = "SENSOR_DEGRADED";
        } else if (sim.eventSubstate === "SENSOR_DEGRADED" && sim.qualityFlag >= 0.75) {
          sim.fsmState = "CRUISE";
          sim.eventSubstate = "";
        }

        if (sim.daidalusLevel >= 2 && sim.fsmState !== "RTB" && sim.fsmState !== "LANDING") {
          sim.fsmState = "EVENT";
          sim.eventSubstate = "TRAFFIC_CONFLICT";
          if (!sim.replanning && sim.routeMode !== "DETOUR") {
            sim.replanning = true;
            sim.replanningFrames = 50;
            sim.replanFrom = { x: sim.uas.x, y: sim.uas.y };
          }
        }

        if (sim.replanning) {
          sim.replanningFrames -= 1 * dt;
          if (sim.replanningFrames <= 0) {
            sim.replanning = false;
            setRoute("DETOUR");
            if (sim.fsmState !== "RTB") {
              sim.fsmState = "CRUISE";
              sim.eventSubstate = "";
            }
          }
        }

        if (sim.fsmState === "EVENT" && sim.eventSubstate === "SENSOR_DEGRADED") {
          sim.uas.speed = 0.7;
        } else if (sim.fsmState === "TAKEOFF") {
          sim.uas.speed = 2.0;
        } else if (sim.fsmState === "CRUISE") {
          sim.uas.speed = 2.4;
        } else if (sim.fsmState === "RTB") {
          sim.uas.speed = 2.1;
        } else if (sim.fsmState === "LANDING") {
          sim.uas.speed = 0.6;
        }

        const targetWp = sim.waypoints[sim.wpIndex];
        if (targetWp) {
          const dx = targetWp.x - sim.uas.x;
          const dy = targetWp.y - sim.uas.y;
          const ang = Math.atan2(dy, dx);
          sim.uas.heading = lerpAngle(sim.uas.heading, ang, 0.12);
          const step = Math.min(sim.uas.speed * dt, Math.hypot(dx, dy));
          sim.uas.x += Math.cos(sim.uas.heading) * step;
          sim.uas.y += Math.sin(sim.uas.heading) * step;

          if (Math.hypot(dx, dy) < 10) {
            sim.wpIndex += 1;
            if (sim.wpIndex >= sim.waypoints.length) {
              if (sim.fsmState === "RTB") {
                sim.fsmState = "LANDING";
                sim.missionDoneAt = performance.now() + 1200;
              } else {
                sim.fsmState = "LANDING";
                sim.missionDoneAt = performance.now() + 1200;
              }
            } else if (sim.fsmState === "TAKEOFF" && sim.wpIndex > 2) {
              sim.fsmState = "CRUISE";
            }
          }
        } else if (sim.fsmState === "LANDING" && performance.now() > sim.missionDoneAt) {
          sim.running = false;
        }

        sim.trail.push({ x: sim.uas.x, y: sim.uas.y });
        if (sim.trail.length > 240) sim.trail.shift();
      }

      function drawGrid() {
        ctx.fillStyle = "#0d1b2a";
        ctx.fillRect(0, 0, W, H);

        ctx.strokeStyle = "#163047";
        ctx.lineWidth = 1;
        for (let x = 0; x <= W; x += 30) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, H);
          ctx.stroke();
        }
        for (let y = 0; y <= H; y += 30) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(W, y);
          ctx.stroke();
        }

        ctx.fillStyle = "#12263a";
        const blocks = [
          [80, 70, 110, 70], [95, 165, 85, 50], [170, 80, 70, 45], [385, 355, 130, 90],
          [520, 340, 120, 100], [700, 325, 140, 95], [690, 30, 130, 45], [410, 25, 130, 50]
        ];
        blocks.forEach((b) => ctx.fillRect(b[0], b[1], b[2], b[3]));
      }

      function drawNfz() {
        NFZ.forEach((z) => {
          ctx.save();
          ctx.fillStyle = "rgba(255,59,48,0.22)";
          ctx.strokeStyle = "#ff3b30";
          ctx.lineWidth = 2;
          ctx.setLineDash([6, 4]);
          ctx.fillRect(z.x, z.y, z.w, z.h);
          ctx.strokeRect(z.x, z.y, z.w, z.h);
          ctx.setLineDash([]);
          ctx.beginPath();
          ctx.rect(z.x, z.y, z.w, z.h);
          ctx.clip();
          ctx.strokeStyle = "rgba(255,59,48,0.45)";
          ctx.lineWidth = 1;
          for (let i = -z.h; i < z.w; i += 10) {
            ctx.beginPath();
            ctx.moveTo(z.x + i, z.y + z.h);
            ctx.lineTo(z.x + i + z.h, z.y);
            ctx.stroke();
          }
          ctx.restore();
          ctx.fillStyle = "#ff8a80";
          ctx.font = "12px monospace";
          ctx.fillText(z.name, z.x + 8, z.y + 16);
        });
      }

      function drawPath() {
        ctx.strokeStyle = "#4db7ff";
        ctx.lineWidth = 2;
        ctx.setLineDash([8, 6]);
        ctx.beginPath();
        for (let i = 0; i < BASE_PATH.length; i++) {
          const p = BASE_PATH[i];
          if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
        }
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.strokeStyle = sim.routeMode === "DETOUR" ? "#ffae42" : sim.routeMode === "RTB" ? "#ff9500" : "#2dd4bf";
        ctx.lineWidth = 2.2;
        ctx.beginPath();
        ctx.moveTo(sim.uas.x, sim.uas.y);
        for (let i = sim.wpIndex; i < sim.waypoints.length; i++) {
          const p = sim.waypoints[i];
          ctx.lineTo(p.x, p.y);
        }
        ctx.stroke();
      }

      function drawTrail() {
        if (sim.trail.length < 2) return;
        ctx.beginPath();
        for (let i = 0; i < sim.trail.length; i++) {
          const p = sim.trail[i];
          if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
        }
        ctx.strokeStyle = "rgba(45,212,191,0.45)";
        ctx.lineWidth = 1.6;
        ctx.stroke();
      }

      function drawUas() {
        const c = STATE_COLORS[sim.fsmState] || "#ffffff";
        ctx.save();
        ctx.translate(sim.uas.x, sim.uas.y);
        ctx.rotate(sim.uas.heading);
        ctx.fillStyle = c;
        ctx.beginPath();
        ctx.moveTo(12, 0);
        ctx.lineTo(-10, -7);
        ctx.lineTo(-4, 0);
        ctx.lineTo(-10, 7);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = "#00131f";
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.restore();
      }

      function drawIntruder() {
        if (!sim.intruder.active) return;
        const i = sim.intruder;
        const r = 34 + Math.sin(i.pulse) * 4 + sim.daidalusLevel * 14;
        const ring = sim.daidalusLevel === 3 ? "#ff3b30" : sim.daidalusLevel === 2 ? "#ff9500" : "#ffd60a";
        if (sim.daidalusLevel > 0) {
          ctx.beginPath();
          ctx.arc(i.x, i.y, r, 0, Math.PI * 2);
          ctx.strokeStyle = ring;
          ctx.lineWidth = 2;
          ctx.setLineDash([7, 6]);
          ctx.stroke();
          ctx.setLineDash([]);
        }

        ctx.save();
        ctx.translate(i.x, i.y);
        ctx.rotate(Math.atan2(i.vy, i.vx));
        ctx.fillStyle = "#ff3b30";
        ctx.beginPath();
        ctx.moveTo(10, 0);
        ctx.lineTo(-8, -6);
        ctx.lineTo(-6, 0);
        ctx.lineTo(-8, 6);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      function drawHomeTarget() {
        ctx.fillStyle = "#8be9fd";
        ctx.beginPath();
        ctx.arc(HOME.x, HOME.y, 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#67d9ff";
        ctx.fillText("HOME", HOME.x + 10, HOME.y + 4);

        ctx.fillStyle = "#00e676";
        ctx.beginPath();
        ctx.arc(TARGET.x, TARGET.y, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#7ef9ad";
        ctx.fillText("TARGET", TARGET.x - 56, TARGET.y - 12);
      }

      function drawStatusBanner() {
        const stateText = sim.eventSubstate ? (sim.fsmState + "/" + sim.eventSubstate) : sim.fsmState;
        ctx.fillStyle = "rgba(0,0,0,0.45)";
        ctx.fillRect(10, 10, 360, 24);
        ctx.fillStyle = STATE_COLORS[sim.fsmState] || "#ffffff";
        ctx.font = "13px monospace";
        ctx.fillText("FSM: " + stateText + " | Route: " + sim.routeMode, 16, 27);
        if (sim.replanning) {
          ctx.fillStyle = "#ffcc00";
          ctx.fillText("REPLANNING PATH...", 16, 49);
        }
      }

      function draw() {
        drawGrid();
        drawNfz();
        drawPath();
        drawTrail();
        drawHomeTarget();
        drawIntruder();
        drawUas();
        drawStatusBanner();
      }

      function updateUi() {
        ui.qualityTxt.textContent = sim.qualityFlag.toFixed(2);
        ui.alertTxt.textContent = sim.daidalusAlert;
        ui.batteryTxt.textContent = Math.round(sim.battery) + "%";
        ui.fsmTxt.textContent = sim.eventSubstate ? (sim.fsmState + "/" + sim.eventSubstate) : sim.fsmState;

        ui.qualityBar.style.width = (sim.qualityFlag * 100) + "%";
        ui.qualityBar.style.background = sim.qualityFlag < 0.5 ? "#ff3b30" : sim.qualityFlag < 0.8 ? "#ffcc00" : "#35c759";

        ui.alertBar.style.width = (sim.daidalusLevel * 25) + "%";
        ui.alertBar.style.background = sim.daidalusLevel >= 3 ? "#ff3b30" : sim.daidalusLevel === 2 ? "#ff9500" : sim.daidalusLevel === 1 ? "#ffd60a" : "#3d5f79";

        ui.batteryBar.style.width = Math.max(0, sim.battery) + "%";
        ui.batteryBar.style.background = sim.battery < 15 ? "#ff3b30" : sim.battery < 35 ? "#ff9500" : "#35c759";

        ui.fsmBar.style.width = "100%";
        ui.fsmBar.style.background = STATE_COLORS[sim.fsmState] || "#5b7f9b";

        STATES.forEach((s) => {
          const el = document.getElementById("chip-" + s);
          el.classList.toggle("active", sim.fsmState === s);
          el.style.background = sim.fsmState === s ? STATE_COLORS[s] : "#122a3b";
        });
      }

      let last = performance.now();
      function loop(now) {
        const dt = now - last;
        last = now;
        update(dt);
        draw();
        updateUi();
        raf = requestAnimationFrame(loop);
      }

      document.getElementById("startBtn").addEventListener("click", startMission);
      document.getElementById("intruderBtn").addEventListener("click", injectIntruder);
      document.getElementById("sensorBtn").addEventListener("click", sensorFault);
      document.getElementById("batteryBtn").addEventListener("click", batteryCritical);
      document.getElementById("resetBtn").addEventListener("click", function () {
        cancelAnimationFrame(raf);
        last = performance.now();
        resetSim();
        draw();
        updateUi();
      });

      resetSim();
      draw();
      updateUi();
    })();
  </script>
</body>
</html>
